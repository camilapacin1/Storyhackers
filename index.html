<script>
if(!window.storage){
  window.storage={
    _getStore(){try{return JSON.parse(localStorage.getItem('hu-ss-store')||'{}')}catch{return{}}},
    _setStore(d){try{localStorage.setItem('hu-ss-store',JSON.stringify(d))}catch{}},
    async get(k){const d=this._getStore();return d[k]!==undefined?{key:k,value:d[k]}:null},
    async set(k,v){const d=this._getStore();d[k]=v;this._setStore(d);return{key:k,value:v}},
    async delete(k){const d=this._getStore();delete d[k];this._setStore(d);return{key:k,deleted:true}},
    async list(p){const d=this._getStore();return{keys:Object.keys(d).filter(k=>!p||k.startsWith(p))}}
  };
}

          setUPCOMING(up);

const segOpts=useMemo(()=>[...new Set(CASES.filter(c=>{if(fI&&c.industry!==fI)return false;if(fC&&c.country!==fC)return false;if(fCl&&c.client!==fCl)return false;return true}).map(c=>c.segment))].sort(),[fI,fC,fCl,CASES]);
const lib=useMemo(()=>[...baseFiltered].sort((a,b)=>sort==="users"?parseUsers(b.users)-parseUsers(a.users):new Date(b.created)-new Date(a.created)),[baseFiltered,sort]);
const fvC=CASES.filter(c=>favs.has(c.id));const af=[fI,fC,fCl,fS].filter(Boolean).length;
const cntInd=new Set(baseFiltered.map(c=>c.industry)).size;const cntCou=new Set(baseFiltered.map(c=>c.country)).size;const cntCli=new Set(baseFiltered.map(c=>c.client)).size;

return(<div style={{minHeight:"100vh",background:DS.bgLayout,fontFamily:DS.font}}>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<Side open={mo} onClose={()=>setMo(false)} page={pg} setPage={setPg} fc={favs.size} upCount={UPCOMING.length}/>

{/* Header */}
<div style={{background:"#fff",borderBottom:`1px solid ${DS.n100}`,position:"sticky",top:0,zIndex:100}}><div style={{maxWidth:1200,margin:"0 auto",padding:`0 ${DS.sp3}px`}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:DS.sp8}}><div style={{display:"flex",alignItems:"center",gap:DS.sp15}}><button onClick={()=>setMo(true)} style={{background:"none",border:"none",cursor:"pointer",padding:DS.sp05,display:"flex",flexDirection:"column",gap:4.5,width:DS.sp4,height:DS.sp4,borderRadius:DS.rM,alignItems:"center",justifyContent:"center",transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background=DS.n50} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><div style={{width:20,height:2,background:DS.textDefault,borderRadius:1}}/><div style={{width:20,height:2,background:DS.textDefault,borderRadius:1}}/><div style={{width:20,height:2,background:DS.textDefault,borderRadius:1}}/></button><div style={{display:"flex",alignItems:"center",gap:DS.sp1}}><img src={HUMAND_LOGO} alt="Humand" style={{width:32,height:32,borderRadius:DS.rM}}/><span style={{...txt(DS.s,600),color:DS.textDefault}}>Success Stories</span></div></div><div style={{display:"flex",gap:DS.sp05,background:DS.n50,borderRadius:DS.rM,padding:DS.sp025+1}}>{[{k:"library",l:"Biblioteca",I:LibIcon},{k:"favorites",l:"Favoritos",I:HeartIcon},{k:"upcoming",l:"Próximamente",I:ClockIcon}].map(it=>{const a=pg===it.k;return(<button key={it.k} onClick={()=>setPg(it.k)} style={{display:"flex",alignItems:"center",gap:DS.sp05,padding:`${DS.sp05}px ${DS.sp15}px`,borderRadius:DS.rS+2,border:"none",cursor:"pointer",...txt(DS.xs,a?600:400),background:a?"#fff":"transparent",color:a?DS.textDefault:DS.n500,boxShadow:a?DS.shadow4dp:"none",transition:"all .2s"}}><it.I color={a?DS.brand500:DS.n400}/>{it.l}{it.k==="favorites"&&favs.size>0&&<span style={{background:a?DS.brand50:DS.n200,color:a?DS.brand700:DS.n600,...txt(DS.xxxs,600),padding:"1px 6px",borderRadius:999}}>{favs.size}</span>}{it.k==="upcoming"&&<span style={{background:a?DS.brand50:DS.n200,color:a?DS.brand700:DS.n600,...txt(DS.xxxs,600),padding:"1px 6px",borderRadius:999}}>{UPCOMING.length}</span>}</button>)})}</div></div></div></div>

{/* LIBRARY */}
{pg==="library"&&<><div style={{maxWidth:1200,margin:"0 auto",padding:`${DS.sp5}px ${DS.sp3}px 0`}}>
<div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:DS.sp2}}><div><h1 style={{...txt(DS.xxl,600),color:DS.textDefault,margin:0}}>Biblioteca</h1><p style={{...txt(DS.xs),color:DS.textLighter,marginTop:DS.sp1,marginBottom:0}}>Explora los casos de éxito de clientes listos para compartir. Filtra por industria, país y/o cliente.</p></div><div style={{display:"flex",gap:DS.sp1,flexWrap:"wrap"}}><StatBadge value={cntInd} label="Industrias"/><StatBadge value={cntCou} label="Países"/><StatBadge value={cntCli} label="Clientes"/></div></div>
<div style={{marginTop:DS.sp3,display:"flex",gap:DS.sp15,flexWrap:"wrap",alignItems:"center"}}><Sel label="Industria" value={fI} options={indOpts} allLabel="Todas" onChange={setFI}/><Sel label="País" value={fC} options={couOpts} allLabel="Todos" onChange={setFC}/><Sel label="Cliente" value={fCl} options={cliOpts} allLabel="Todos" onChange={setFCl}/><Sel label="Segmento" value={fS} options={segOpts} allLabel="Todos" onChange={setFS}/>{af>0&&<button onClick={()=>{setFI(null);setFC(null);setFCl(null);setFS(null)}} style={{padding:`${DS.sp1}px ${DS.sp2}px`,borderRadius:DS.rM,border:`1.5px solid ${DS.red500}20`,background:DS.red50,color:DS.red500,...txt(DS.xs,600),cursor:"pointer",display:"flex",alignItems:"center",gap:DS.sp05,whiteSpace:"nowrap"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Limpiar</button>}</div>
<div style={{marginTop:DS.sp3,marginBottom:DS.sp2,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{...txt(DS.xs),color:DS.n500}}>{lib.length} {lib.length===1?"caso encontrado":"casos encontrados"}</span><SortDrop sort={sort} setSort={setSort}/></div>
</div><div style={{maxWidth:1200,margin:"0 auto",padding:`0 ${DS.sp3}px ${DS.sp8}px`}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:DS.sp2}}>{lib.map((c,i)=><Card key={c.id} c={c} isFav={favs.has(c.id)} toggleFav={tFav} onPrev={setPrev} mt={mt} idx={i}/>)}</div>{lib.length===0&&<div style={{textAlign:"center",padding:`${DS.sp8}px ${DS.sp3}px`,color:DS.n500}}><div style={{fontSize:40,marginBottom:DS.sp2}}>🔍</div><div style={{...txt(DS.s,600),color:DS.textLighter}}>No se encontraron casos</div><div style={{...txt(DS.xs),color:DS.n500,marginTop:DS.sp05}}>Probá ajustando los filtros</div></div>}</div></>}

{/* FAVORITES */}
{pg==="favorites"&&<><div style={{maxWidth:1200,margin:"0 auto",padding:`${DS.sp5}px ${DS.sp3}px 0`}}><h1 style={{...txt(DS.xxl,600),color:DS.textDefault,margin:0,display:"flex",alignItems:"center",gap:DS.sp15}}>Mis Favoritos<svg width="32" height="32" viewBox="0 0 24 24" fill={DS.yellow400} stroke={DS.yellow400} strokeWidth="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></h1><p style={{...txt(DS.xs),color:DS.textLighter,marginTop:DS.sp15,marginBottom:0}}>{fvC.length>0?"Tus casos de éxito guardados, listos para compartir en cualquier momento.":"Todavía no agregaste ningún caso a favoritos. Explorá la biblioteca y hacé click en la estrellita para guardarlos acá."}</p><div style={{marginTop:DS.sp3,marginBottom:DS.sp2,...txt(DS.xs),color:DS.n500}}>{fvC.length} {fvC.length===1?"caso guardado":"casos guardados"}</div></div><div style={{maxWidth:1200,margin:"0 auto",padding:`0 ${DS.sp3}px ${DS.sp8}px`}}>{fvC.length>0?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:DS.sp2}}>{fvC.map((c,i)=><Card key={c.id} c={c} isFav toggleFav={tFav} onPrev={setPrev} mt={mt} idx={i}/>)}</div>:<div style={{textAlign:"center",padding:`${DS.sp8}px ${DS.sp3}px`}}><div style={{width:80,height:80,borderRadius:DS.rL,background:DS.yellow50,display:"flex",alignItems:"center",justifyContent:"center",margin:`0 auto ${DS.sp3}px`}}><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke={DS.yellow400} strokeWidth="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div style={{...txt(DS.s,600),color:DS.textDefault}}>No hay favoritos aún</div><div style={{...txt(DS.xs),color:DS.n500,marginTop:DS.sp05,maxWidth:320,margin:`${DS.sp05}px auto ${DS.sp3}px`}}>Hacé click en la estrella de cualquier caso de éxito para guardarlo acá</div><button onClick={()=>setPg("library")} style={{padding:`10px ${DS.sp3}px`,borderRadius:DS.rM,border:"none",background:DS.brand500,color:"#fff",...txt(DS.xs,600),cursor:"pointer"}}>Explorar Biblioteca</button></div>}</div></>}

{/* UPCOMING */}
{pg==="upcoming"&&<><div style={{maxWidth:1200,margin:"0 auto",padding:`${DS.sp5}px ${DS.sp3}px 0`}}><div style={{display:"flex",alignItems:"center",gap:DS.sp15}}><h1 style={{...txt(DS.xxl,600),color:DS.textDefault,margin:0}}>Próximamente</h1><span style={{...txt(DS.xxs,600),color:"#fff",background:DS.n500,padding:`${DS.sp025}px ${DS.sp1}px`,borderRadius:999}}>{UPCOMING.length}</span></div><p style={{...txt(DS.xs),color:DS.textLighter,marginTop:DS.sp1,marginBottom:0}}>Estos clientes están en camino a cumplir los criterios de elegibilidad. Cuando alcancen el WAU mínimo o superen los 6 meses desde el lanzamiento, estarán disponibles.</p><div style={{marginTop:DS.sp3,marginBottom:DS.sp2}}></div></div><div style={{maxWidth:1200,margin:"0 auto",padding:`0 ${DS.sp3}px ${DS.sp8}px`}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:DS.sp2}}>{UPCOMING.map((c,i)=><UpCard key={c.id} c={c} mt={mt} idx={i}/>)}</div></div></>}

{prev&&<PModal c={prev} onClose={()=>setPrev(null)}/>}
</div>)}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
